name: Playwright Tests
on: [push, pull_request, workflow_dispatch]

jobs:
  tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14
        
      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Ensure browsers are installed
        run: uv run playwright install --with-deps

      - name: Run Playwright tests
        run: |
          mkdir -p ./test-results
          uv run pytest \
            --md-report --md-report-output ./test-results/report.md --md-report-color never \
            --html=./test-results/report.html --self-contained-html
      
      - name: Add Report to Summary
        if: always()
        run: cat ./test-results/report.md >> $GITHUB_STEP_SUMMARY
      
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automationexercise.com-playwright-test-report
          path: ./test-results/report.html

      - name: Upload Playwright Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-Traces
          path: ./test-results/failed/